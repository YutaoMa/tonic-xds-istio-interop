apiVersion: apps/v1
kind: Deployment
metadata:
  name: greeter
  namespace: xds-test
spec:
  replicas: 2
  selector:
    matchLabels:
      app: greeter
  template:
    metadata:
      labels:
        app: greeter
    spec:
      containers:
      - name: greeter
        image: greeter-server:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 50051
          name: grpc
        env:
        - name: PORT
          value: "50051"
---
apiVersion: v1
kind: Service
metadata:
  name: greeter
  namespace: xds-test
spec:
  selector:
    app: greeter
  ports:
  - port: 50051
    targetPort: 50051
    name: grpc
