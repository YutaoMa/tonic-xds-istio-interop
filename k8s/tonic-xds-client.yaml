apiVersion: v1
kind: ServiceAccount
metadata:
  name: tonic-xds-client
  namespace: xds-test
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tonic-xds-client
  namespace: xds-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tonic-xds-client
  template:
    metadata:
      labels:
        app: tonic-xds-client
      annotations:
        # Use Istio's proxyless-gRPC injection template. The injected
        # pilot-agent acts as a SDS cert agent only — no iptables, no L7
        # proxy. It writes SPIFFE credentials to
        # /var/run/secrets/workload-spiffe-credentials/ and a generated
        # xDS bootstrap to /etc/istio/proxy/grpc-bootstrap.json.
        inject.istio.io/templates: "grpc-agent"
    spec:
      serviceAccountName: tonic-xds-client
      containers:
      - name: tonic-xds-client
        image: greeter-server:latest
        imagePullPolicy: Never
        command: ["/bin/sh", "-c"]
        args:
        - |
          # Bootstrap references the SPIFFE certs Istio's grpc-agent
          # template mounts at /var/run/secrets/workload-spiffe-credentials/.
          # The provider instance is named "default" — istiod emits
          # CDS `UpstreamTlsContext` referencing the same name.
          export GRPC_XDS_BOOTSTRAP_CONFIG="{
            \"xds_servers\": [{
              \"server_uri\": \"http://istiod.istio-system.svc.cluster.local:15010\",
              \"channel_creds\": [{\"type\": \"insecure\"}],
              \"server_features\": [\"xds_v3\"]
            }],
            \"node\": {
              \"id\": \"sidecar~${POD_IP}~${POD_NAME}.xds-test~xds-test.svc.cluster.local\",
              \"cluster\": \"tonic-xds-client.xds-test\",
              \"metadata\": {\"GENERATOR\": \"grpc\"}
            },
            \"certificate_providers\": {
              \"default\": {
                \"plugin_name\": \"file_watcher\",
                \"config\": {
                  \"certificate_file\":  \"/var/run/secrets/workload-spiffe-credentials/cert.pem\",
                  \"private_key_file\":  \"/var/run/secrets/workload-spiffe-credentials/key.pem\",
                  \"ca_certificate_file\": \"/var/run/secrets/workload-spiffe-credentials/ca.crt\",
                  \"refresh_interval\":   \"600s\"
                }
              }
            }
          }"
          exec xds-channel
        env:
        - name: RUST_LOG
          value: "info,tonic_xds=debug,xds_client=debug"
        - name: XDS_TARGET
          value: "xds:///greeter.xds-test.svc.cluster.local:50051"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
