apiVersion: v1
kind: ServiceAccount
metadata:
  name: tonic-xds-client
  namespace: xds-test
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tonic-xds-client
  namespace: xds-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tonic-xds-client
  template:
    metadata:
      labels:
        app: tonic-xds-client
      annotations:
        # Use Istio's proxyless-gRPC injection template. The injected
        # pilot-agent runs as an SDS cert agent (no iptables, no L7 proxy)
        # and provides:
        #   - SPIFFE workload credentials under /var/lib/istio/data/
        #   - generated xDS bootstrap at /etc/istio/proxy/grpc-bootstrap.json,
        #     surfaced via the GRPC_XDS_BOOTSTRAP env var
        inject.istio.io/templates: "grpc-agent"
    spec:
      serviceAccountName: tonic-xds-client
      containers:
      - name: tonic-xds-client
        image: greeter-server:latest
        imagePullPolicy: Never
        command: ["tonic-xds-client"]
        env:
        - name: XDS_TARGET
          value: "xds:///greeter.xds-test.svc.cluster.local:50051"
        - name: RUST_LOG
          # Defaults set verbose tracing on tonic-xds + xds-client so
          # `tracing::warn!`/`tracing::error!` calls surface in `kubectl logs`.
          value: "info,tonic_xds=debug,xds_client=debug"
